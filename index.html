<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Landing Pages</title>
    
    <style>
        /* Reset básico */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            padding: 15px; 
            color: #333; 
        }
        
        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        h1 { 
            color: #1e40af; 
            font-size: 22px; 
            margin-bottom: 20px; 
            text-align: center;
        }
        
        .form-group { margin-bottom: 16px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px; 
            font-size: 14px; 
            color: #4b5563;
        }
        
        input[type="text"], 
        input[type="url"], 
        select { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 16px; 
            outline: none;
            transition: border-color 0.2s;
            background-color: white;
        }
        
        input[type="text"]:focus, 
        input[type="url"]:focus,
        select:focus {
            border-color: #2563eb;
        }
        
        /* Estilos do Menu Suspenso Customizado (Dropdown) */
        .dropdown-container {
            position: relative;
        }
        
        .custom-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #2563eb;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
        }
        
        .custom-dropdown.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            font-size: 16px;
        }
        
        .dropdown-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-item:hover, .dropdown-item:active {
            background-color: #eff6ff;
            color: #1d4ed8;
        }
        
        button.add-btn { 
            background: #2563eb; 
            color: white; 
            padding: 14px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
        }
        
        button.add-btn:hover { background: #1d4ed8; }
        button.add-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        
        hr { border: 0; border-top: 1px solid #e5e7eb; margin: 25px 0; }
        h2 { font-size: 18px; color: #1f2937; margin-bottom: 15px; }
        
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f3f4f6; gap: 12px; }
        .left-side { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1; }
        
        /* Cores dos Links */
        .name-link { text-decoration: none; color: #1e40af; font-weight: bold; font-size: 16px; word-break: break-word; transition: color 0.3s; }
        .name-link.green { color: #16a34a; } /* Verde */
        .name-link.gold { color: #d97706; }  /* Dourado */
        
        .category-tag { font-size: 12px; color: #4b5563; background: #e5e7eb; padding: 4px 10px; border-radius: 6px; cursor: pointer; user-select: none; white-space: nowrap; transition: 0.2s;}
        .category-tag:hover { background: #d1d5db; }
        
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; flex-shrink: 0; transition: 0.2s; }
        .btn-delete:hover { background: #dc2626; }
        .loading-text { font-style: italic; color: #6b7280; font-size: 15px; }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { padding: 35px; }
            h1 { font-size: 26px; text-align: left; }
            h2 { font-size: 20px; }
            .link-item { flex-wrap: nowrap; padding: 12px 0; }
            .left-side { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Minhas Landing Pages</h1>
    
    <form id="link-form">
        <div class="form-group">
            <label>Nome da Página</label>
            <input type="text" id="name-input" placeholder="Ex: Lyon Salão" required autocomplete="off">
        </div>
        
        <div class="form-group dropdown-container">
            <label>Categoria</label>
            <input type="text" id="category-input" placeholder="Selecione na lista ou digite..." required autocomplete="off">
            <div id="category-dropdown" class="custom-dropdown"></div>
        </div>
        
        <div class="form-group">
            <label>Link (URL)</label>
            <input type="url" id="url-input" placeholder="https://..." required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>Cor / Status Inicial</label>
            <select id="status-input">
                <option value="NORMAL">Normal (Azul)</option>
                <option value="GREEN">Verde (1º Clique)</option>
                <option value="GOLD">Dourado (2º Clique)</option>
            </select>
        </div>
        
        <button type="submit" class="add-btn" id="submit-btn">Adicionar</button>
    </form>
    
    <hr>
    
    <h2>Links Salvos</h2>
    <div id="links-list"><span class="loading-text">Carregando seus links...</span></div>
</div>

<script>
    // --- ATENÇÃO: COLE O SEU LINK DO SHEETDB AQUI DENTRO DAS ASPAS ---
    const API_URL = "https://sheetdb.io/api/v1/9wia5qcdhjpv9"; 
    // -----------------------------------------------------------------

    const categorias =[
        "Academia", "Açougue", "Adega", "Agência de viagens", "Água e gás", "Alfaiataria", "Antiquário", "Armarinho", 
        "Assistência técnica de celulares", "Assistência técnica de eletrodomésticos", "Autoelétrica", 
        "Autoescola", "Autopeças", "Banca de revistas", "Bar", "Barbearia", "Bazar", "Bicicletaria", 
        "Borracharia", "Brechó", "Cafeteria", "Calçados", "Carrinho de cachorro-quente", "Casa de carnes", 
        "Casa de câmbio", "Casa de construção", "Chaveiro", "Clínica de estética", "Clínica médica", 
        "Clínica odontológica", "Clínica veterinária", "Concessionária de veículos", "Confeitaria", "Construção Civil",
        "Conveniência", "Copiadora e gráfica rápida", "Corretora de seguros", "Costureira", "Cozinha industrial", 
        "Curso de idiomas", "Decoração e design de interiores", "Depósito de bebidas", "Despachante", 
        "Doceria", "Drogaria", "Eletrodomésticos", "Eletrônicos", "Empréstimos e finanças", "Escola de artes", "Escola de música", 
        "Escritório de advocacia", "Escritório de contabilidade", "Estacionamento", "Estúdio de pilates", 
        "Estúdio de tatuagem", "Farmácia", "Farmácia de manipulação", "Ferragens", "Floricultura", 
        "Fruteira e hortifruti", "Funilaria e pintura", "Galeria de arte", "Hamburgueria", "Hotel", 
        "Imobiliária", "Informática", "Internet e/ou streaming", "Joalheria", "Lanchonete", "Lava-jato", "Lavanderia", "Livraria", 
        "Loja de antiguidades", "Loja de artesanato", "Loja de artigos religiosos", "Loja de brinquedos", 
        "Loja de colchões", "Loja de departamentos", "Loja de esportes", "Loja de ferramentas", 
        "Loja de games", "Loja de instrumentos musicais", "Loja de jardinagem", "Loja de móveis", 
        "Loja de parafusos", "Loja de pesca", "Loja de pneus", "Loja de presentes", "Loja de produtos naturais", 
        "Loja de roupas", "Loja de suplementos", "Loja de variedades", "Loja de vinhos", "Madeireira", 
        "Manicure e pedicure", "Marcenaria", "Marmoraria", "Mecânica automotiva", "Mercado", "Mercearia", 
        "Moda íntima", "Móveis planejados", "Oficina de motos", "Ótica", "Padaria", "Papelaria", 
        "Pastelaria", "Peixaria", "Perfumaria", "Pet shop", "Pizzaria", "Posto de combustível", "Pousada", 
        "Pronto-socorro", "Relojoaria", "Restaurante a quilo", "Restaurante prato feito", "Restaurante japonês", "Restaurante vegetariano", 
        "Restaurante à la carte", "Rotisseria", "Salão de beleza", "Sapataria", "Sebo (livros usados)", 
        "Serralheria", "Shopping center", "Sorveteria", "Supermercado", "Tabacaria", "Tapeçaria", "Teatro", 
        "Tintas", "Transportadora", "Vidraçaria"
    ];

    // Lógica do Menu Suspenso Customizado (Dropdown)
    const categoryInput = document.getElementById('category-input');
    const categoryDropdown = document.getElementById('category-dropdown');

    function renderDropdown(filterText = '') {
        categoryDropdown.innerHTML = '';
        const lowerFilter = filterText.toLowerCase();
        
        const filtered = categorias.filter(c => c.toLowerCase().includes(lowerFilter));
        
        if (filtered.length === 0) {
            categoryDropdown.classList.remove('show');
            return;
        }

        filtered.forEach(c => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.textContent = c;
            
            div.addEventListener('click', () => {
                categoryInput.value = c;
                categoryDropdown.classList.remove('show');
            });
            
            categoryDropdown.appendChild(div);
        });
        
        categoryDropdown.classList.add('show');
    }

    categoryInput.addEventListener('focus', () => renderDropdown(categoryInput.value));
    categoryInput.addEventListener('input', (e) => renderDropdown(e.target.value));

    document.addEventListener('click', (e) => {
        if (!categoryInput.contains(e.target) && !categoryDropdown.contains(e.target)) {
            categoryDropdown.classList.remove('show');
        }
    });

    // Lógica principal do sistema
    const form = document.getElementById('link-form');
    const submitBtn = document.getElementById('submit-btn');
    const listContainer = document.getElementById('links-list');
    
    async function loadLinks() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            renderLinks(data);
        } catch (error) {
            listContainer.innerHTML = '<span style="color: red;">Erro ao carregar. Verifique a URL do SheetDB.</span>';
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.textContent = "Salvando...";
        submitBtn.disabled = true;

        const data = {
            id: "ID-" + Date.now(), 
            name: document.getElementById('name-input').value,
            category: categoryInput.value,
            url: document.getElementById('url-input').value,
            sold: document.getElementById('status-input').value // Salva: NORMAL, GREEN ou GOLD
        };

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({data:[data]}) 
            });
            form.reset();
            categoryDropdown.classList.remove('show');
            await loadLinks();
        } catch (error) {
            alert("Erro ao adicionar. Tente novamente.");
        } finally {
            submitBtn.textContent = "Adicionar";
            submitBtn.disabled = false;
        }
    });

    // Função que alterna entre as 3 cores
    window.toggleStatus = async function(id, currentStatus) {
        document.body.style.cursor = "wait";
        
        // Define a próxima cor na sequência
        let newStatus = "GREEN"; 
        if (currentStatus === "NORMAL" || currentStatus === "FALSE") newStatus = "GREEN";
        else if (currentStatus === "GREEN" || currentStatus === "TRUE") newStatus = "GOLD";
        else if (currentStatus === "GOLD") newStatus = "NORMAL";
        
        try {
            await fetch(`${API_URL}/id/${id}`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({sold: newStatus}) 
            });
            await loadLinks();
        } catch (error) {
            alert("Erro ao atualizar status.");
        } finally {
            document.body.style.cursor = "default";
        }
    };

    window.deleteLink = async function(id) {
        if(!confirm("Tem certeza que deseja excluir?")) return;
        
        document.body.style.cursor = "wait";
        try {
            await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
            await loadLinks();
        } catch (error) {
            alert("Erro ao excluir.");
        } finally {
            document.body.style.cursor = "default";
        }
    };

    function renderLinks(data) {
        listContainer.innerHTML = '';
        
        if(data.error) {
            listContainer.innerHTML = '<span class="loading-text">Erro na API ou a planilha está vazia.</span>';
            return;
        }

        if (data.length === 0) {
            listContainer.innerHTML = '<span class="loading-text">Nenhuma página salva ainda.</span>';
            return;
        }

        data.forEach(item => {
            if(!item.name && !item.url) return; 

            const status = item.sold || "NORMAL";
            
            // Define qual classe de cor aplicar baseada no status
            let colorClass = "";
            if (status === "GREEN" || status === "TRUE") colorClass = "green";
            if (status === "GOLD") colorClass = "gold";

            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <div class="left-side">
                    <a href="${item.url}" target="_blank" class="name-link ${colorClass}">${item.name}</a>
                    <span class="category-tag" onclick="toggleStatus('${item.id}', '${status}')" title="Clique para mudar a cor">${item.category}</span>
                </div>
                <button class="btn-delete" onclick="deleteLink('${item.id}')">Excluir</button>
            `;
            listContainer.appendChild(div);
        });
    }

    loadLinks();
</script>
</body>
</html>
