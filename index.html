<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minhas Landing Pages</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1e40af; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button.add-btn { background: #2563eb; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Estilos da Lista */
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 15px; }
        .left-side { display: flex; align-items: center; gap: 10px; }
        .name-link { text-decoration: none; color: #1e40af; font-weight: bold; font-size: 16px; }
        .name-link.sold { color: #f97316; } /* Laranja para vendido */
        .category-tag { font-size: 12px; color: #4b5563; background: #e5e7eb; padding: 2px 8px; border-radius: 4px; cursor: pointer; user-select: none; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Minhas Landing Pages</h1>
    <form id="link-form">
        <div class="form-group">
            <label>Nome da Página</label>
            <input type="text" id="name-input" required>
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <input type="text" id="category-input" list="cats" required>
            <datalist id="cats"></datalist>
        </div>
        <div class="form-group">
            <label>Link (URL)</label>
            <input type="url" id="url-input" required>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="sold-checkbox" style="width: auto;"> Marcar como vendido agora?</label>
        </div>
        <button type="submit" class="add-btn">Adicionar</button>
    </form>
    <hr style="margin: 20px 0;">
    <h2>Links Salvos</h2>
    <div id="links-list">Carregando...</div>
</div>

<script>
    // --- COLE O SEU LINK DO SHEETDB AQUI ABAIXO ---
    const API_URL = "https://sheetdb.io/api/v1/9wia5qcdhjpv9"; 
    // ----------------------------------------------

    const categorias = ["Academia", "Açougue", "Adega", "Agência de viagens", "Alfaiataria", "Antiquário", "Armarinho", "Assistência técnica de celulares", "Assistência técnica de eletrodomésticos", "Autoelétrica", "Autoescola", "Autopeças", "Banca de revistas", "Bar", "Barbearia", "Bazar", "Bicicletaria", "Borracharia", "Brechó", "Cafeteria", "Calçados", "Carrinho de cachorro-quente", "Casa de carnes", "Casa de câmbio", "Casa de construção", "Chaveiro", "Clínica de estética", "Clínica médica", "Clínica odontológica", "Clínica veterinária", "Confeitaria", "Concessionária de veículos", "Conveniência", "Copiadora e gráfica rápida", "Corretora de seguros", "Costureira", "Cozinha industrial", "Curso de idiomas", "Decoração e design de interiores", "Depósito de bebidas", "Despachante", "Doceria", "Drogaria", "Eletrodomésticos", "Eletrônicos", "Escola de artes", "Escola de música", "Escritório de advocacia", "Escritório de contabilidade", "Estacionamento", "Estúdio de pilates", "Estúdio de tatuagem", "Farmácia", "Farmácia de manipulação", "Ferragens", "Floricultura", "Fruteira e hortifruti", "Funilaria e pintura", "Galeria de arte", "Hamburgueria", "Hotel", "Imobiliária", "Informática", "Joalheria", "Lanchonete", "Lava-jato", "Lavanderia", "Livraria", "Loja de antiguidades", "Loja de artesanato", "Loja de artigos religiosos", "Loja de brinquedos", "Loja de colchões", "Loja de departamentos", "Loja de esportes", "Loja de ferramentas", "Loja de games", "Loja de instrumentos musicais", "Loja de jardinagem", "Loja de móveis", "Loja de parafusos", "Loja de pesca", "Loja de pneus", "Loja de presentes", "Loja de produtos naturais", "Loja de roupas", "Loja de suplementos", "Loja de variedades", "Loja de vinhos", "Madeireira", "Manicure e pedicure", "Marcenaria", "Marmoraria", "Mecânica automotiva", "Mercado", "Mercearia", "Moda íntima", "Móveis planejados", "Oficina de motos", "Ótica", "Padaria", "Papelaria", "Pastelaria", "Peixaria", "Perfumaria", "Pet shop", "Pizzaria", "Posto de combustível", "Pousada", "Pronto-socorro", "Relojoaria", "Restaurante a quilo", "Restaurante à la carte", "Restaurante japonês", "Restaurante vegetariano", "Rotisseria", "Salão de beleza", "Sapataria", "Sebo (livros usados)", "Serralheria", "Shopping center", "Sorveteria", "Supermercado", "Tabacaria", "Tapeçaria", "Teatro", "Tintas", "Transportadora", "Vidraçaria"];

    const datalist = document.getElementById('cats');
    categorias.forEach(c => { const opt = document.createElement('option'); opt.value = c; datalist.appendChild(opt); });

    const form = document.getElementById('link-form');
    
    async function loadLinks() {
        const res = await fetch(API_URL);
        const data = await res.json();
        render(data);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('name-input').value,
            category: document.getElementById('category-input').value,
            url: document.getElementById('url-input').value,
            sold: document.getElementById('sold-checkbox').checked ? "TRUE" : "FALSE"
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: [data]}) });
        form.reset();
        loadLinks();
    });

    async function toggleSold(id, currentStatus) {
        const newStatus = currentStatus === "TRUE" ? "FALSE" : "TRUE";
        await fetch(`${API_URL}/id/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sold: newStatus}) });
        loadLinks();
    }

    async function deleteLink(id) {
        await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
        loadLinks();
    }

    function render(data) {
        const list = document.getElementById('links-list');
        list.innerHTML = '';
        data.forEach(item => {
            const isSold = item.sold === "TRUE";
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <div class="left-side">
                    <a href="${item.url}" target="_blank" class="name-link ${isSold ? 'sold' : ''}">${item.name}</a>
                    <span class="category-tag" onclick="toggleSold('${item.id}', '${item.sold}')">${item.category}</span>
                </div>
                <button class="btn-delete" onclick="deleteLink('${item.id}')">Excluir</button>
            `;
            list.appendChild(div);
        });
    }

    loadLinks();
</script>
</body>
</html>
